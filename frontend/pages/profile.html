<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hồ Sơ - Aurelia Prada</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <style>
      .loading {
        text-align: center;
        padding: 40px;
        color: #666;
      }

      .user-info-card {
        padding: 20px;
        background: #f9f9f9;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      .user-info-card p {
        margin: 8px 0;
        color: #666;
      }

      .user-info-card .label {
        font-weight: 600;
        color: #333;
      }

      .logout-btn {
        background-color: #dc3545;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        margin-top: 15px;
      }

      .logout-btn:hover {
        background-color: #c82333;
      }

      .alert {
        padding: 12px 15px;
        border-radius: 6px;
        margin-bottom: 20px;
      }

      .alert.error {
        background: #fee;
        color: #c33;
        border: 1px solid #fcc;
        display: none;
      }

      .alert.error.show {
        display: block;
      }

      .orders-empty {
        text-align: center;
        padding: 40px 20px;
        color: #999;
      }
    </style>
  </head>
  <body>
    <header class="top-nav"></header>

    <main class="section">
      <div class="container">
        <h1>Hồ Sơ Cá Nhân</h1>

        <div class="alert error" id="errorAlert"></div>

        <div id="loadingSpinner" class="loading">
          Đang tải thông tin...
        </div>

        <div id="profileContent" style="display: none;">
          <div class="two-col" style="grid-template-columns:280px 1fr;">
            <aside class="card panel">
              <div class="user-info-card">
                <h3 id="userName" style="margin: 0 0 10px 0;">Đang tải...</h3>
                <p id="userEmail" style="margin: 0; color: #999;"></p>
                <hr style="margin: 15px 0; border: none; border-top: 1px solid #ddd;" />
                <p><span class="label">Vị trí:</span> <span id="userRole" style="color: #666;"></span></p>
                <p><span class="label">Số điện thoại:</span> <span id="userPhone" style="color: #666;">---</span></p>
                <p><span class="label">Thành phố:</span> <span id="userCity" style="color: #666;">---</span></p>
              </div>

              <button class="tab-btn active" style="width:100%;margin-bottom:8px;" data-profile-tab="orders">Đơn Hàng Của Tôi</button>
              <button class="tab-btn" style="width:100%;margin-bottom:8px;" data-profile-tab="settings">Cài Đặt Tài Khoản</button>
              <button class="logout-btn" id="logoutBtn">Đăng Xuất</button>
            </aside>

            <section class="card panel">
              <article data-profile-panel="orders">
                <h2>Lịch Sử Đơn Hàng</h2>
                <div id="ordersContainer"></div>
              </article>

              <article data-profile-panel="settings" hidden>
                <h2>Cài Đặt Tài Khoản</h2>
                <form id="settingsForm">
                  <div class="form-grid">
                    <div class="full">
                      <label>Họ và Tên</label>
                      <input class="input" id="settingName" type="text" />
                    </div>
                    <div class="full">
                      <label>Email</label>
                      <input class="input" id="settingEmail" type="email" disabled />
                    </div>
                    <div class="full">
                      <label>Số Điện Thoại</label>
                      <input class="input" id="settingPhone" type="tel" />
                    </div>
                    <div class="full">
                      <label>Địa Chỉ (Số nhà, đường...)</label>
                      <input class="input" id="settingStreet" type="text" />
                    </div>
                    <div>
                      <label>Thành Phố</label>
                      <input class="input" id="settingCity" type="text" />
                    </div>
                    <div>
                      <label>Quốc Gia</label>
                      <input class="input" id="settingCountry" type="text" />
                    </div>
                  </div>
                  <button class="btn btn-dark" type="submit" style="margin-top:20px;">Lưu Thay Đổi</button>
                </form>
              </article>
            </section>
          </div>
        </div>
      </div>
    </main>
 
    <footer class="site-footer"></footer>
    <script type="module" src="../assets/js/common.js"></script>
    <script type="module" src="../assets/js/profile.js"></script> 
  </body>
</html>
