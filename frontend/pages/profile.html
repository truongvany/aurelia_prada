<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hồ Sơ - Aurelia Prada</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <style>
      .profile-shell { min-height: 100vh; background: linear-gradient(180deg, #fbf8f3 0%, #f7f2ec 100%); padding: 40px 0; }
      .profile-card { border-radius: 20px; box-shadow: 0 30px 70px rgba(16, 20, 35, 0.1); border: 1px solid rgba(47, 60, 86, 0.09); background: #ffffff; }
      .profile-aside { min-width: 280px; max-width: 320px; }
      .profile-avatar { display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:24px; }
      .profile-avatar img { border-radius: 50%; width: 110px; height:110px; object-fit:cover; }
      .profile-nav-btn { width:100%; text-align:left; padding: 12px 16px; border: 1px solid #e9e6e5; border-radius: 12px; margin-bottom: 10px; background: #fff; cursor: pointer; }
      .profile-nav-btn.active { background: #111; color: #fff; }
      .profile-nav-btn:hover { background: #f5f3f0; }
      .profile-dash-header { margin-bottom: 24px; display:flex; justify-content:space-between; align-items:center; }
      .profile-dash-header h1 { margin:0; font-size: 28px; }
      .orders-table { width:100%; border-collapse: collapse; }
      .orders-table th, .orders-table td { padding: 12px 8px; border-bottom: 1px solid #eee; font-size: 14px; }
      .orders-table th { color: #777; text-transform: uppercase; letter-spacing:.04em; }
      .status-pill { padding: 8px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
      .status-delivered { background: rgba(40, 167, 69, 0.12); color: #198754; }
      .status-processing { background: rgba(255, 193, 7, 0.14); color: #856404; }
      .btn-light-custom { background: #f8f7f4; color: #333; border: 1px solid #bebdb8; }
      .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
      .form-grid .full { grid-column:1 / -1; }
      .form-grid label { display:block; margin-bottom:6px; color:#444; font-weight:600; }
      .form-grid input { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; background:#fafafa; }
      @media (max-width: 991px) {
        .profile-layout { display:block; }
        .profile-aside { width:100%; }
        .profile-main { width:100%; margin-top:20px; }
        .form-grid { grid-template-columns:1fr; }
      }
    </style>
  </head>
  <body>
    <header class="top-nav"></header>

    <main class="profile-shell">
      <div class="container">
        <div class="profile-dash-header">
          <h1 class="font-serif fw-bold">Trang Hồ Sơ Cá Nhân</h1>
          <button id="signOutBtn" class="btn btn-dark rounded-pill px-4">Đăng Xuất</button>
        </div>

        <div id="errorAlert" class="alert error" style="display:none;"></div>
        <div id="loadingSpinner" class="loading">Đang tải thông tin...</div>

        <div id="profileContent" style="display:none;" class="profile-layout" >
          <aside class="profile-aside">
            <div class="profile-card p-4 profile-avatar text-center">
              <img id="avatarImage" src="https://ui-avatars.com/api/?name=User" alt="Avatar" />
              <h5 id="userName" class="font-serif fw-bold mb-0">Đang tải...</h5>
              <p id="userEmail" class="text-muted small mb-0">...</p>
            </div>

            <div class="profile-card p-3">
              <button class="profile-nav-btn active" data-profile-tab="orders">Đơn Hàng</button>
              <button class="profile-nav-btn" data-profile-tab="wishlist">Wishlist</button>
              <button class="profile-nav-btn" data-profile-tab="settings">Tài Khoản</button>
            </div>
          </aside>

          <section class="profile-main" style="margin-left:20px; flex:1;">
            <div class="profile-card p-4">
              <article data-profile-panel="orders">
                <h4 class="font-serif fw-bold mb-4">Lịch Sử Đơn Hàng</h4>
                <div class="table-responsive">
                  <table class="orders-table" id="ordersTable">
                    <thead>
                      <tr>
                        <th>Mã</th>
                        <th>Ngày</th>
                        <th>Trạng thái</th>
                        <th class="text-end">Total</th>
                        <th class="text-end">Action</th>
                      </tr>
                    </thead>
                    <tbody id="ordersContainer"></tbody>
                  </table>
                </div>
              </article>

              <article data-profile-panel="wishlist" hidden>
                <div class="text-center py-5">
                  <p>Chưa có sản phẩm trong wishlist.</p>
                  <button class="btn btn-light-custom rounded-pill" onclick="window.location.href='shop.html'">Duyệt sản phẩm</button>
                </div>
              </article>

              <article data-profile-panel="settings" hidden>
                <h4 class="font-serif fw-bold mb-3">Cài Đặt Tài Khoản</h4>
                <form id="settingsForm">
                  <div class="form-grid">
                    <div class="full">
                      <label>Họ và tên</label>
                      <input id="settingName" type="text" />
                    </div>
                    <div class="full">
                      <label>Email</label>
                      <input id="settingEmail" type="email" disabled />
                    </div>
                    <div class="full">
                      <label>Số điện thoại</label>
                      <input id="settingPhone" type="tel" />
                    </div>
                    <div class="full">
                      <label>Địa chỉ</label>
                      <input id="settingStreet" type="text" />
                    </div>
                    <div>
                      <label>Thành phố</label>
                      <input id="settingCity" type="text" />
                    </div>
                    <div>
                      <label>Quốc gia</label>
                      <input id="settingCountry" type="text" />
                    </div>
                  </div>
                  <div class="mt-3 text-end">
                    <button class="btn btn-dark rounded-pill px-4" type="submit">Lưu Thay Đổi</button>
                  </div>
                </form>
              </article>
            </div>
          </section>
        </div>
      </div>
    </main>

    <footer class="site-footer"></footer>

    <script type="module" src="../assets/js/common.js"></script>
    <script type="module" src="../assets/js/profile.js"></script>
    <script>
      document.getElementById('signOutBtn').addEventListener('click', () => {
        if (confirm('Bạn có chắn muốn đăng xuất?')) {
          localStorage.removeItem('token');
          window.location.href = 'login.html';
        }
      });
    </script>
  </body>
</html>
