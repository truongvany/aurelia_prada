<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liên hệ | AURELIA PRADA</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <style>
      :root {
        --aura-accent: #000;
        --aura-muted: #888;
        --aura-bg-soft: #fcfcfc;
      }
      body { background-color: #fff; }

      /* Wrap everything in a container to fix the "crooked" look */
      .contact-page-wrapper {
        padding: 60px 0;
      }

      .contact-container {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        min-height: 700px;
        background: #fff;
        border: 1px solid #f0f0f0;
      }

      .contact-visual {
        background: url('https://images.unsplash.com/photo-1544441893-675973e31985?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
        position: relative;
        overflow: hidden;
      }
      .contact-visual::after {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.05); /* Very subtle overlay */
      }

      .contact-content {
        padding: 60px 80px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .contact-header { margin-bottom: 50px; }
      .contact-header h1 { 
        font-size: 3rem; 
        font-weight: 800; 
        text-transform: uppercase; 
        letter-spacing: 4px; 
        margin-bottom: 15px;
        line-height: 1;
      }
      .contact-header p { 
        font-size: 13px; 
        color: var(--aura-muted); 
        max-width: 400px; 
        line-height: 1.8;
      }

      .aura-form { display: grid; gap: 25px; }
      .input-field label { 
        font-size: 10px; 
        font-weight: 800; 
        text-transform: uppercase; 
        color: #999; 
        letter-spacing: 1.5px;
        display: block;
        margin-bottom: 5px;
      }
      .input-field input, .input-field textarea {
        width: 100%;
        border: none;
        border-bottom: 1.5px solid #eee;
        padding: 10px 0;
        font-size: 14px;
        background: transparent;
        transition: 0.3s;
        outline: none;
      }
      .input-field input:focus, .input-field textarea:focus {
        border-color: #000;
      }

      .btn-submit {
        background: #000;
        color: #fff;
        border: none;
        padding: 18px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 15px;
      }
      .btn-submit:hover { opacity: 0.8; }

      .contact-info-footer {
        margin-top: 60px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        border-top: 1px solid #f5f5f5;
        padding-top: 30px;
      }
      .info-block h5 { 
        font-size: 10px; 
        font-weight: 800; 
        text-transform: uppercase; 
        color: #aaa; 
        margin-bottom: 10px;
        letter-spacing: 1px;
      }
      .info-block p { font-size: 13px; line-height: 1.5; font-weight: 600; }

      @media (max-width: 1024px) {
        .contact-container { grid-template-columns: 1fr; }
        .contact-visual { height: 350px; }
        .contact-content { padding: 40px; }
        .contact-header h1 { font-size: 2.5rem; }
      }
    </style>
  </head>
  <body>
    <header class="top-nav"></header>

    <div class="container contact-page-wrapper">
      <div class="contact-container">
        <!-- Visual Side -->
        <div class="contact-visual"></div>
        
        <!-- Content Side -->
        <div class="contact-content">
          <div class="contact-header">
            <h1>Liên hệ</h1>
            <p>AURELIA trân trọng mọi phản hồi từ khách hàng. Hãy kết nối với chúng tôi để nhận được sự hỗ trợ tận tâm nhất.</p>
          </div>

          <form id="contact-form" class="aura-form">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="input-field">
                <label>Họ</label>
                <input type="text" placeholder="Nguyễn" required>
              </div>
              <div class="input-field">
                <label>Tên</label>
                <input type="text" placeholder="Anh" required>
              </div>
            </div>
            
            <div class="input-field">
              <label>Địa chỉ Email</label>
              <input type="email" placeholder="example@mail.com" required>
            </div>

            <div class="input-field">
              <label>Bạn cần hỗ trợ điều gì?</label>
              <textarea rows="3" placeholder="Lời nhắn của bạn..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Gửi thông điệp</button>
            <p id="form-feedback" style="display:none; text-align:center; color:#27ae60; font-weight:800; font-size:11px; margin-top:15px; text-transform:uppercase;"></p>
          </form>

          <footer class="contact-info-footer">
            <div class="info-block">
              <h5>Địa chỉ Flagship</h5>
              <p>123 Fashion Avenue<br>Quận Hoàn Kiếm, Hà Nội</p>
            </div>
            <div class="info-block">
              <h5>Liên lạc nhanh</h5>
              <p>0246 662 3434<br>hello@aurelia.com</p>
            </div>
          </footer>
        </div>
      </div>
    </div>

    <footer class="site-footer"></footer>

    <script type="module">
      const form = document.getElementById('contact-form');
      const feedback = document.getElementById('form-feedback');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        feedback.textContent = '✓ Gửi thành công';
        feedback.style.display = 'block';
        form.reset();
        setTimeout(() => { feedback.style.display = 'none'; }, 4000);
      });
    </script>
    <script type="module" src="../assets/js/common.js"></script>
  </body>
</html>
