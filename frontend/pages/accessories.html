<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurelia | Phụ Kiện Cao Cấp — Accessories Collection</title>
    <meta name="description" content="Khám phá bộ sưu tập phụ kiện cao cấp của Aurelia Prada: túi xách, kính mát, trang sức, khăn lụa và nhiều hơn nữa. Tinh tế trong từng chi tiết." />
    <link rel="icon" type="image/png" href="../assets/images/logo/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="../assets/css/shop.css" />
    <link rel="stylesheet" href="../assets/css/accessories.css" />
  </head>
  <body class="acc-page">

    <header class="top-nav"></header>

    <main class="acc-page-main">

      <!-- ============================================================
           HERO — cinematic editorial layout
           ============================================================ -->
      <section class="acc-hero" aria-label="Accessories Hero Banner">
        <img
          class="acc-hero-img"
          src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?auto=format&fit=crop&w=1800&q=85"
          alt="Aurelia Accessories Collection 2026"
        />
        <div class="acc-hero-overlay">
          <div class="acc-hero-content">

            <!-- LEFT: breadcrumb + text -->
            <div class="acc-hero-left">
              <nav class="acc-breadcrumb" aria-label="Breadcrumb">
                <a href="../index.html">Trang chủ</a>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                <span class="acc-breadcrumb-current">Phụ kiện</span>
              </nav>

              <div class="acc-hero-eyebrow">
                <div class="acc-hero-eyebrow-line"></div>
                <span class="acc-hero-eyebrow-text">Bộ sưu tập 2026</span>
              </div>

              <h1 class="acc-hero-title">
                Accessories
                <em>Tinh tế trong từng chi tiết</em>
              </h1>
            </div>

            <!-- RIGHT: collection stats -->
            <div class="acc-hero-right" aria-hidden="true">
              <div class="acc-hero-stat">
                <span class="acc-hero-stat-num">120+</span>
                <span class="acc-hero-stat-label">Sản phẩm</span>
              </div>
              <div class="acc-hero-stat">
                <span class="acc-hero-stat-num">8</span>
                <span class="acc-hero-stat-label">Danh mục</span>
              </div>
              <div class="acc-hero-stat">
                <span class="acc-hero-stat-num">100%</span>
                <span class="acc-hero-stat-label">Cao cấp</span>
              </div>
            </div>

          </div>
        </div>
      </section>

      <!-- ============================================================
           CATEGORY QUICK TABS
           ============================================================ -->
      <nav class="acc-category-tabs" aria-label="Lọc theo danh mục nhanh">
        <div class="container">
          <div class="acc-tabs-inner" id="acc-quick-tabs">
            <button class="acc-tab-btn active" data-cat="" id="acc-tab-all">TẤT CẢ</button>
            <div class="acc-tab-divider"></div>
            <button class="acc-tab-btn" data-cat="Túi xách" id="acc-tab-bag">TÚI XÁCH</button>
            <button class="acc-tab-btn" data-cat="Ví" id="acc-tab-wallet">VÍ</button>
            <button class="acc-tab-btn" data-cat="Thắt lưng" id="acc-tab-belt">THẮT LƯNG</button>
            <button class="acc-tab-btn" data-cat="Kính mắt" id="acc-tab-glasses">KÍNH MẮT</button>
            <div class="acc-tab-divider"></div>
            <button class="acc-tab-btn" data-cat="Mũ" id="acc-tab-hat">MŨ</button>
            <button class="acc-tab-btn" data-cat="Trang sức" id="acc-tab-jewelry">TRANG SỨC</button>
            <button class="acc-tab-btn" data-cat="Khăn" id="acc-tab-scarf">KHĂN</button>
          </div>
        </div>
      </nav>

      <!-- ============================================================
           MAIN CONTENT
           ============================================================ -->
      <div class="acc-page-body">
        <div class="container acc-layout">

          <!-- ─── SIDEBAR FILTER ─── -->
          <aside class="acc-sidebar" aria-label="Bộ lọc sản phẩm">

            <!-- Sidebar header -->
            <div class="acc-sidebar-header">
              <span class="acc-sidebar-title">
                <!-- filter icon -->
                <svg class="acc-sidebar-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                </svg>
                Bộ lọc
              </span>
              <button class="acc-sidebar-reset" id="acc-reset-filters" title="Xoá tất cả bộ lọc">Xoá tất cả</button>
            </div>

            <!-- ── DANH MỤC ── -->
            <div class="acc-filter-section open" id="acc-section-category">
              <button class="acc-filter-toggle" aria-expanded="true">
                <span class="acc-filter-toggle-label">Danh mục</span>
                <svg class="acc-filter-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
              </button>
              <div class="acc-filter-body">
                <div class="acc-filter-items" id="acc-cat-filter">
                  <!-- Skeleton placeholders -->
                  <div class="acc-filter-item">
                    <div class="acc-skeleton-line short" style="height:11px;width:80%;border-radius:2px;"></div>
                  </div>
                  <div class="acc-filter-item">
                    <div class="acc-skeleton-line short" style="height:11px;width:65%;border-radius:2px;"></div>
                  </div>
                  <div class="acc-filter-item">
                    <div class="acc-skeleton-line short" style="height:11px;width:75%;border-radius:2px;"></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- ── GIÁ ── -->
            <div class="acc-filter-section open" id="acc-section-price">
              <button class="acc-filter-toggle" aria-expanded="true">
                <span class="acc-filter-toggle-label">Khoảng giá</span>
                <svg class="acc-filter-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
              </button>
              <div class="acc-filter-body">
                <div class="acc-price-labels">
                  <span>0 đ</span>
                  <span id="acc-price-max">—</span>
                </div>
                <input
                  type="range"
                  id="acc-price-slider"
                  min="0"
                  max="10000000"
                  value="10000000"
                  class="aura-range-slider"
                  aria-label="Lọc theo giá tối đa"
                >
                <div class="acc-price-badge" id="acc-price-current">0 đ — 10.000.000 đ</div>
              </div>
            </div>

          </aside>

          <!-- ─── PRODUCT CONTENT ─── -->
          <section class="acc-content" aria-label="Danh sách phụ kiện">

            <!-- Topbar -->
            <div class="acc-filter-topbar">
              <p class="acc-result-count" id="acc-result-count">Đang tải...</p>
              <select class="acc-sort-select" id="acc-sort" aria-label="Sắp xếp sản phẩm">
                <option value="default">Mặc định</option>
                <option value="newest">Mới nhất</option>
                <option value="price-asc">Giá: Thấp → Cao</option>
                <option value="price-desc">Giá: Cao → Thấp</option>
              </select>
            </div>

            <!-- Product Grid -->
            <div class="acc-grid shop-grid" id="acc-grid" role="list">
              <div class="acc-skeleton-card"><div class="acc-skeleton-img"></div><div class="acc-skeleton-line"></div><div class="acc-skeleton-line short"></div><div class="acc-skeleton-line price"></div></div>
              <div class="acc-skeleton-card"><div class="acc-skeleton-img"></div><div class="acc-skeleton-line"></div><div class="acc-skeleton-line short"></div><div class="acc-skeleton-line price"></div></div>
              <div class="acc-skeleton-card"><div class="acc-skeleton-img"></div><div class="acc-skeleton-line"></div><div class="acc-skeleton-line short"></div><div class="acc-skeleton-line price"></div></div>
              <div class="acc-skeleton-card"><div class="acc-skeleton-img"></div><div class="acc-skeleton-line"></div><div class="acc-skeleton-line short"></div><div class="acc-skeleton-line price"></div></div>
            </div>

            <!-- Pagination -->
            <nav class="acc-pagination shop-pagination" id="acc-pagination" aria-label="Phân trang"></nav>

          </section>
        </div>
      </div>

      <!-- Editorial Band -->
      <div class="container acc-editorial-wrap">
        <div class="acc-editorial-band">
          <div class="acc-editorial-text">
            <h3>Lookbook Xuân Hè 2026</h3>
            <p>Khám phá cách phối phụ kiện theo phong cách tối giản sang trọng</p>
          </div>
          <a href="shop.html" class="acc-editorial-cta">Khám phá ngay</a>
        </div>
      </div>

    </main>

    <!-- Floating scroll-top -->
    <div class="floating-tools">
      <button class="tool-btn" id="acc-scroll-top" title="Lên đầu trang" aria-label="Cuộn lên đầu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg>
      </button>
    </div>

    <footer class="site-footer"></footer>

    <script type="module" src="../assets/js/common.js"></script>
    <script type="module" src="../assets/js/accessories.js"></script>

    <script type="module">
      document.addEventListener('DOMContentLoaded', () => {

        /* ── Quick tabs sync with sidebar ── */
        const tabs = document.querySelectorAll('.acc-tab-btn');
        tabs.forEach(tab => {
          tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const cat = tab.getAttribute('data-cat');
            // Uncheck all
            document.querySelectorAll('input[name="acc-category"]').forEach(cb => {
              cb.checked = false;
              cb.closest('.acc-filter-item')?.classList.remove('is-active');
            });
            // Check matching
            if (cat) {
              const match = document.querySelector(`input[name="acc-category"][value="${cat}"]`);
              if (match) {
                match.checked = true;
                match.closest('.acc-filter-item')?.classList.add('is-active');
              }
            }
            document.querySelectorAll('input[name="acc-category"]').forEach(cb => cb.dispatchEvent(new Event('change', { bubbles: true })));
          });
        });

        /* ── Sidebar section collapse toggle ── */
        document.querySelectorAll('.acc-filter-toggle').forEach(btn => {
          btn.addEventListener('click', () => {
            const section = btn.closest('.acc-filter-section');
            section.classList.toggle('open');
            btn.setAttribute('aria-expanded', section.classList.contains('open'));
          });
        });

        /* ── Reset all filters ── */
        document.getElementById('acc-reset-filters')?.addEventListener('click', () => {
          // Uncheck all
          document.querySelectorAll('input[name="acc-category"]').forEach(cb => {
            cb.checked = false;
            cb.closest('.acc-filter-item')?.classList.remove('is-active');
          });
          // Reset tabs to "TẤT CẢ"
          tabs.forEach(t => t.classList.remove('active'));
          document.querySelector('.acc-tab-btn[data-cat=""]')?.classList.add('active');
          // Trigger filter
          document.querySelectorAll('input[name="acc-category"]').forEach(cb => cb.dispatchEvent(new Event('change', { bubbles: true })));
          // Reset price slider
          const slider = document.getElementById('acc-price-slider');
          if (slider) {
            slider.value = slider.max;
            slider.dispatchEvent(new Event('input'));
          }
        });

      });
    </script>

  </body>
</html>
