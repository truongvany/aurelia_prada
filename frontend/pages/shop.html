<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurelia | Shop - All Collections</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <link rel="stylesheet" href="../assets/css/shop.css" />
  </head>
  <body>
    <header class="top-nav">
      <!-- Header content is dynamically injected via common.js -->
    </header>

    <main class="shop-page-main">
      <div class="container shop-layout">
        <!-- SIDEBAR FILTERS -->
        <aside class="filters-sidebar">
          <div class="filter-header">LỌC SẢN PHẨM</div>
          
          <div class="filter-group">
            <div class="filter-group-header" data-toggle="collapse" data-target="#cat-filter">
              <h5>DANH MỤC</h5>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"></polyline></svg>
            </div>
            <div class="filter-group-content" id="cat-filter">
              <label class="filter-item">
                <input type="checkbox" name="category" value="Vest" hidden>
                <div class="filter-checkbox"></div>
                <span>Vest</span>
              </label>
              <label class="filter-item">
                <input type="checkbox" name="category" value="Blazer" hidden>
                <div class="filter-checkbox"></div>
                <span>Blazer</span>
              </label>
              <label class="filter-item">
                <input type="checkbox" name="category" value="Măng tô" hidden>
                <div class="filter-checkbox"></div>
                <span>Măng tô</span>
              </label>
              <label class="filter-item">
                <input type="checkbox" name="category" value="Lông vũ" hidden>
                <div class="filter-checkbox"></div>
                <span>Lông vũ</span>
              </label>
              <label class="filter-item">
                <input type="checkbox" name="category" value="Khác" hidden>
                <div class="filter-checkbox"></div>
                <span>Khác</span>
              </label>
            </div>
          </div>

          <div class="filter-group">
            <div class="filter-group-header">
              <h5>GIÁ</h5>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"></polyline></svg>
            </div>
            <div class="filter-group-content">
              <div class="price-range-wrapper">
                <div class="price-values">
                  <span>0 đ</span>
                  <span id="price-max-display">0 đ</span>
                </div>
                <input type="range" id="price-slider" min="0" max="10000000" value="10000000" class="aura-range-slider">
                <div class="price-current-value">
                  Đang lọc: <strong id="price-current-display">0 đ - 10.000.000 đ</strong>
                </div>
              </div>
            </div>
          </div>

          <div class="filter-group">
            <div class="filter-group-header">
              <h5>MÀU CƠ BẢN</h5>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transform: rotate(-90deg)"><polyline points="18 15 12 9 6 15"></polyline></svg>
            </div>
            <div class="filter-group-content collapsed">
              <!-- Content placeholder -->
            </div>
          </div>

          <div class="filter-group">
            <div class="filter-group-header">
              <h5>BỘ SƯU TẬP</h5>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"></polyline></svg>
            </div>
            <div class="filter-group-content">
              <label class="filter-item">
                <input type="checkbox" name="collection" value="Silk" hidden>
                <div class="filter-checkbox"></div>
                <span>Premium Silk by Format</span>
              </label>
              <label class="filter-item">
                <input type="checkbox" name="collection" value="FirstClass" hidden>
                <div class="filter-checkbox"></div>
                <span>First Class</span>
              </label>
              <label class="filter-item">
                <input type="checkbox" name="collection" value="No11" hidden>
                <div class="filter-checkbox"></div>
                <span>No.11 Être Douce</span>
              </label>
            </div>
          </div>
        </aside>

        <!-- PRODUCT LIST SECTION -->
        <section class="shop-content">
          <div class="shop-grid" id="shop-grid">
            <!-- Dynamically injected products -->
          </div>
          
          <nav class="shop-pagination" aria-label="Page navigation" style="margin-top: 48px; justify-content: center; display: flex; gap: 8px;">
            <a href="#" class="btn-pagination disabled">Trước</a>
            <a href="#" class="btn-pagination active">1</a>
            <a href="#" class="btn-pagination">2</a>
            <a href="#" class="btn-pagination">Sau</a>
          </nav>
        </section>
      </div>
    </main>

    <!-- FLOATING TOOLS -->
    <div class="floating-tools">
        <button class="tool-btn" title="Hỗ trợ">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        </button>
        <button class="tool-btn" id="scroll-top" title="Lên đầu trang">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </button>
    </div>

    <footer class="site-footer">
        <!-- Footer content is dynamically injected via common.js -->
    </footer>
    <script type="module" src="../assets/js/common.js"></script>
    <script type="module" src="../assets/js/shop.js"></script>
  </body>
</html>
