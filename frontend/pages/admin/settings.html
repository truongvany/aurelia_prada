<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURELIA | Settings Admin</title>
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../assets/css/admin.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
    </style>
  </head>
  <body class="admin-body">
    <div id="admin-app">
      <!-- Main Section -->
      <main class="dashboard-main">
        <div class="dashboard-title-row">
          <div>
            <h2>Cấu hình Hệ thống</h2>
            <p>Thiết lập thông tin thương hiệu và tùy chỉnh.</p>
          </div>
        </div>

        <div class="chart-card form-section">
          <form id="settings-form">
            <div class="admin-input-group">
              <label class="admin-label">Tên Thương Hiệu</label>
              <input class="admin-input" value="AURELIA PRADA" />
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="admin-input-group">
                <label class="admin-label">Email hỗ trợ</label>
                <input class="admin-input" value="concierge@aureliaprda.com" />
              </div>
              <div class="admin-input-group">
                <label class="admin-label">Hotline</label>
                <input class="admin-input" value="+84 (0) 898 123 456" />
              </div>
            </div>

            <div class="admin-input-group">
              <label class="admin-label">Đơn vị tiền tệ</label>
              <select class="admin-input" style="appearance: auto;">
                <option>VND (đ) - Đồng Việt Nam</option>
                <option>USD ($) - Đô la Mỹ</option>
                <option>EUR (€) - Euro</option>
              </select>
            </div>

            <div class="admin-input-group">
              <label class="admin-label">Địa chỉ Trụ sở</label>
              <textarea class="admin-input" rows="4">123 Đại lộ Cao Cấp, Quận 1, Thành phố Hồ Chí Minh, Việt Nam</textarea>
            </div>

            <button type="submit" class="btn-admin-save">LƯU CẤU HÌNH</button>
            <p id="settings-notice" style="margin-top: 15px; font-size: 13px; font-weight: 700; color: #1E7E34;"></p>
          </form>
        </div>

      </main>
    </div>

    <script type="module" src="../../assets/js/common.js"></script>
    <script type="module" src="../../assets/js/admin.js"></script>
  </body>
</html>
