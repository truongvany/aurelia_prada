<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURELIA | Settings Admin</title>
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../assets/css/admin.css" />
    <style>
      /* Page specific tweaks if needed */
    </style>
  </head>
  <body class="admin-body">
    <div id="admin-app">
      <!-- Main Section -->
      <main class="dashboard-main">
        <div class="dashboard-title-row">
          <div>
            <h2>Cấu hình Hệ thống</h2>
            <p>Thiết lập thông tin thương hiệu và tùy chỉnh.</p>
          </div>
        </div>

        <div class="chart-card form-section">
          <form id="settings-form">
            <div class="admin-input-group">
              <label class="admin-label">Tên Thương Hiệu</label>
              <input id="setting-brand-name" class="admin-input" value="AURELIA PRADA" />
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="admin-input-group">
                <label class="admin-label">Email hỗ trợ</label>
                <input id="setting-support-email" class="admin-input" value="concierge@aureliaprda.com" />
              </div>
              <div class="admin-input-group">
                <label class="admin-label">Hotline</label>
                <input id="setting-hotline" class="admin-input" value="+84 (0) 898 123 456" />
              </div>
            </div>

            <div class="admin-input-group">
              <label class="admin-label">Đơn vị tiền tệ</label>
              <select id="setting-currency" class="admin-input" style="appearance: auto;">
                <option value="VND">VND (đ) - Đồng Việt Nam</option>
                <option value="USD">USD ($) - Đô la Mỹ</option>
                <option value="EUR">EUR (€) - Euro</option>
              </select>
            </div>

            <div class="admin-input-group">
              <label class="admin-label">Địa chỉ Trụ sở</label>
              <textarea id="setting-head-office" class="admin-input" rows="4">123 Đại lộ Cao Cấp, Quận 1, Thành phố Hồ Chí Minh, Việt Nam</textarea>
            </div>

            <div class="admin-input-group" style="margin-top: 12px; border-top: 1px dashed #e5e7eb; padding-top: 18px;">
              <label class="admin-label" style="font-size: 14px; letter-spacing: .3px;">Cấu hình tài khoản ngân hàng nhận tiền</label>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="admin-input-group">
                <label class="admin-label">Mã ngân hàng VietQR</label>
                <input id="setting-bank-code" class="admin-input" placeholder="VD: VCB" value="VCB" />
              </div>
              <div class="admin-input-group">
                <label class="admin-label">Tên ngân hàng</label>
                <input id="setting-bank-name" class="admin-input" placeholder="VD: Vietcombank" value="Vietcombank" />
              </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              <div class="admin-input-group">
                <label class="admin-label">Tên tài khoản</label>
                <input id="setting-bank-account-name" class="admin-input" placeholder="VD: AURELIA PRADA" value="AURELIA PRADA" />
              </div>
              <div class="admin-input-group">
                <label class="admin-label">Số tài khoản</label>
                <input id="setting-bank-account-number" class="admin-input" placeholder="VD: 1234567890" value="1234567890" />
              </div>
            </div>

            <div class="admin-input-group">
              <label class="admin-label">Chi nhánh</label>
              <input id="setting-bank-branch" class="admin-input" placeholder="VD: Chi nhánh TP. Hồ Chí Minh" value="Chi nhánh TP. Hồ Chí Minh" />
            </div>

            <button type="submit" class="btn-admin-save">LƯU CẤU HÌNH</button>
            <p id="settings-notice" style="margin-top: 15px; font-size: 13px; font-weight: 700; color: #1E7E34;"></p>
          </form>
        </div>

      </main>
    </div>

    <script type="module" src="../../assets/js/common.js"></script>
    <script type="module" src="../../assets/js/admin.js"></script>
  </body>
</html>
