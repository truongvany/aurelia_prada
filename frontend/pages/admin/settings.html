<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurelia Admin | Settings</title>
    <link rel="stylesheet" href="../../assets/css/styles.css" />
  </head>
  <body>
    <header class="top-nav"><div class="container nav-inner"><a class="brand" href="dashboard.html">AURELIA Admin</a><a class="btn btn-outline" href="../../index.html">View Store</a></div></header>
    <main class="admin-shell">
      <aside class="admin-side">
        <a href="dashboard.html" data-admin-link>Dashboard</a>
        <a href="products.html" data-admin-link>Products</a>
        <a href="orders.html" data-admin-link>Orders</a>
        <a href="customers.html" data-admin-link>Customers</a>
        <a href="settings.html" data-admin-link>Settings</a>
      </aside>
      <section class="admin-main">
        <h1>Settings</h1>
        <form id="settings-form" class="card panel">
          <div class="form-grid">
            <div><label>Store Name</label><input class="input" value="Aurelia" /></div>
            <div><label>Contact Email</label><input class="input" value="hello@aurelia.com" /></div>
            <div><label>Phone</label><input class="input" value="+1 (555) 123-4567" /></div>
            <div><label>Currency</label><select class="select"><option>VND (đ)</option><option>USD ($)</option><option>EUR (€)</option></select></div>
            <div class="full"><label>Address</label><textarea rows="3">123 Fashion Avenue, NY 10001, USA</textarea></div>
          </div>
          <button class="btn btn-dark" style="margin-top:14px;">Save Changes</button>
          <p id="settings-notice" class="notice"></p>
        </form>
      </section>
    </main>
    <script type="module" src="../../assets/js/common.js"></script>
    <script type="module" src="../../assets/js/admin.js"></script>
  </body>
</html>
