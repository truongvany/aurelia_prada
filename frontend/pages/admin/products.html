<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURELIA | Products Admin</title>
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../assets/css/admin.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
    </style>
  </head>
  <body class="admin-body">
    <div id="admin-app">
      <!-- Main Section -->
      <main class="dashboard-main">
        <div class="dashboard-title-row">
          <div>
            <h2>Danh sách Sản phẩm</h2>
            <p>Quản lý kho hàng và thông tin sản phẩm.</p>
          </div>
          <button class="btn-export" id="add-product-btn">THÊM SẢN PHẨM MỚI</button>
        </div>

        <div class="table-card">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Sản phẩm</th>
                <th>Danh mục</th>
                <th>Giá bán</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="admin-products-body">
              <!-- JS Injected -->
            </tbody>
          </table>
        </div>

      </main>
    </div>

    <!-- Product Modal -->
    <div class="modal-overlay" id="product-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">Cập nhật Sản phẩm</h2>
          <button class="btn-close-modal" id="close-modal">&times;</button>
        </div>
        <form id="product-form">
          <input type="hidden" id="edit-product-id" />
          <div class="admin-input-group">
            <label class="admin-label">Tên sản phẩm</label>
            <input class="admin-input" id="prod-name" required />
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="admin-input-group">
              <label class="admin-label">Giá bán (đ)</label>
              <input type="number" class="admin-input" id="prod-price" required />
            </div>
            <div class="admin-input-group">
              <label class="admin-label">Danh mục</label>
              <select class="admin-input" id="prod-category" required>
                <!-- JS Injected -->
              </select>
            </div>
          </div>
          <div class="admin-input-group">
            <label class="admin-label">Tồn kho</label>
            <input type="number" class="admin-input" id="prod-stock" required />
          </div>
          <div class="admin-input-group">
            <label class="admin-label">Đường dẫn ảnh</label>
            <input class="admin-input" id="prod-image" placeholder="/assets/images/products/..." required />
          </div>
          <div class="admin-input-group">
            <label class="admin-label">Mô tả</label>
            <textarea class="admin-input" id="prod-desc" rows="3"></textarea>
          </div>
          <button type="submit" class="btn-admin-save" style="width:100%">LƯU THAY ĐỔI</button>
        </form>
      </div>
    </div>

    <script type="module" src="../../assets/js/common.js"></script>
    <script type="module" src="../../assets/js/admin.js"></script>
  </body>
</html>
