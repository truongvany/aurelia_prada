<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURELIA | Products Admin</title>
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../assets/css/admin.css" />
    <style>
      /* Page specific tweaks if needed */
    </style>
  </head>
  <body class="admin-body">
    <div id="admin-app">
      <!-- Main Section -->
      <main class="dashboard-main">
        <div class="dashboard-title-row">
          <div>
            <h2>Danh sách Sản phẩm</h2>
            <p>Quản lý kho hàng và thông tin sản phẩm.</p>
          </div>
          <button class="btn-export" id="add-product-btn">THÊM SẢN PHẨM MỚI</button>
        </div>

        <div style="display:flex; gap:12px; align-items:center; margin-bottom:16px; flex-wrap:wrap;">
          <select id="category-filter" class="admin-input" style="max-width:260px;">
            <option value="">Tat ca danh muc</option>
          </select>
          <input
            id="product-search"
            class="admin-input"
            placeholder="Tim theo ten san pham..."
            style="max-width:320px;"
          />
        </div>

        <div class="table-card">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Sản phẩm</th>
                <th>Danh mục</th>
                <th>Giá bán</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="admin-products-body">
              <!-- JS Injected -->
            </tbody>
          </table>
        </div>

      </main>
    </div>


    <script type="module" src="../../assets/js/common.js"></script>
    <script type="module" src="../../assets/js/admin.js"></script>
  </body>
</html>
