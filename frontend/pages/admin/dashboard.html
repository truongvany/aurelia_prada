<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURELIA | Luxury Editorial Admin</title>
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../assets/css/admin.css" />
    <style>
      /* Quick additional fixes for icons or fonts */
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
    </style>
  </head>
  <body class="admin-body">
    <div id="admin-app">
      <!-- Dashboard Main -->
      <main class="dashboard-main">
        <div class="dashboard-title-row">
          <div>
            <h2>Tổng quan</h2>
            <p>Hiệu suất hoạt động và phân tích hệ thống thời gian thực.</p>
          </div>
          <button class="btn-export">XUẤT BÁO CÁO</button>
        </div>

        <!-- KPI Grid -->
        <div class="kpi-grid">
          <!-- Revenue -->
          <div class="kpi-card">
            <div class="kpi-label">
              TỔNG DOANH THU
            </div>
            <div class="kpi-value-row">
              <span class="kpi-value" id="stat-revenue">0đ</span>
              <span class="kpi-trend up">+12.5%</span>
            </div>
            <div class="kpi-progress">
              <div class="kpi-progress-bar" style="width: 75%"></div>
            </div>
          </div>
          <!-- Orders -->
          <div class="kpi-card">
            <div class="kpi-label">
              TỔNG ĐƠN HÀNG
            </div>
            <div class="kpi-value-row">
              <span class="kpi-value" id="stat-orders">0</span>
              <span class="kpi-trend up">+3.2%</span>
            </div>
            <p style="font-size: 10px; margin-top: 5px;">98 đơn hàng chờ xử lý</p>
          </div>
          <!-- Customers -->
          <div class="kpi-card">
            <div class="kpi-label">
              KHÁCH HÀNG
            </div>
            <div class="kpi-value-row">
              <span class="kpi-value" id="stat-customers">0</span>
              <span class="kpi-trend up">+18.1%</span>
            </div>
          </div>
          <!-- Products -->
          <div class="kpi-card">
            <div class="kpi-label">
              SẢN PHẨM HOẠT ĐỘNG
            </div>
            <div class="kpi-value-row">
              <span class="kpi-value" id="stat-products">0</span>
              <span style="font-size: 11px; color: var(--muted); font-weight: 700; margin-left: 5px;">Stable</span>
            </div>
            <p style="font-size: 10px; margin-top: 5px;">12 mã sắp hết hàng</p>
          </div>
        </div>

        <!-- Charts + Sales -->
        <div class="dashboard-layout">
          <!-- Chart -->
          <div class="chart-card">
            <div class="card-header">
              <h3>Tổng quan doanh số</h3>
              <div style="display: flex; gap: 8px;">
                <small style="color: var(--admin-sidebar); font-weight: 800; border-bottom: 2px solid var(--admin-sidebar);">TUẦN</small>
                <small style="color: var(--admin-text-muted); font-weight: 800;">THÁNG</small>
              </div>
            </div>
            <p style="font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px;">DỮ LIỆU HIỆU SUẤT THEO THÁNG</p>
            <div class="bar-chart" id="dashboard-chart">
              <!-- JS Injected Bars -->
            </div>
          </div>

          <!-- List -->
          <div class="list-card">
            <div class="card-header">
              <h3>Đơn hàng gần đây</h3>
            </div>
            <div class="sales-list" id="recent-sales-list">
              <!-- JS Injected Sales -->
            </div>
            <button class="btn-view-all-trans">XEM TẤT CẢ GIAO DỊCH</button>
          </div>
        </div>

      </main>
    </div>

    <!-- Script Integration -->
    <script type="module" src="../../assets/js/common.js"></script>
    <script type="module" src="../../assets/js/admin.js"></script>
  </body>
</html>
