<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản | Aurelia Prada</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        .ivy-register-shell {
            padding: 80px 0;
            background: #fff;
        }
        .ivy-register-title {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 50px;
            font-family: 'Manrope', sans-serif;
        }
        .ivy-register-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 60px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .ivy-auth-section-title {
            font-size: 14px;
            font-weight: 700;
            color: #666;
            margin-bottom: 25px;
            font-family: 'Manrope', sans-serif;
        }
        .ivy-form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .ivy-form-group {
            margin-bottom: 20px;
        }
        .ivy-form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .ivy-form-group label span {
            color: #d00;
        }
        .ivy-form-group input, .ivy-form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #eee;
            border-radius: 4px;
            font-size: 13px;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }
        .ivy-form-group input:focus {
            border-color: #000;
        }
        .ivy-form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #eee;
            border-radius: 4px;
            font-size: 13px;
            min-height: 100px;
            outline: none;
        }
        
        .ivy-side-card {
            background: #fff;
        }

        .ivy-check-group {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .ivy-check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #666;
            cursor: pointer;
        }
        .ivy-check-item input {
            width: 16px;
            height: 16px;
            accent-color: #000;
        }
        
        .ivy-btn-auth-full {
            width: 100%;
            padding: 18px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 4px 18px 18px 4px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 30px;
            transition: opacity 0.2s;
        }
        .ivy-btn-auth-full:hover {
            opacity: 0.9;
        }

        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 30px;
            font-size: 13px;
            display: none;
        }
        .alert.show { display: block; }
        .alert.error { background: #fee; color: #c33; border: 1px solid #fcc; }
        .alert.success { background: #efe; color: #28a745; border: 1px solid #cfc; }

        @media (max-width: 1024px) {
            .ivy-register-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="bg-white">
    <header class="top-nav"></header>

    <main class="ivy-register-shell">
        <div class="container">
            <h1 class="ivy-register-title">Đăng Ký</h1>
            
            <div id="errorAlert" class="alert error"></div>
            <div id="successAlert" class="alert success"></div>

            <form id="registerForm" class="ivy-register-grid">
                <!-- Left Column: Customer Info -->
                <div class="ivy-auth-main">
                    <h3 class="ivy-auth-section-title">Thông tin khách hàng</h3>
                    
                    <div class="ivy-form-row">
                        <div class="ivy-form-group">
                            <label>Họ<span>*</span></label>
                            <input type="text" id="lastName" placeholder="Họ..." required>
                        </div>
                        <div class="ivy-form-group">
                            <label>Tên<span>*</span></label>
                            <input type="text" id="firstName" placeholder="Tên..." required>
                        </div>
                    </div>

                    <div class="ivy-form-row">
                        <div class="ivy-form-group">
                            <label>Email<span>*</span></label>
                            <input type="email" id="email" placeholder="Email..." required>
                        </div>
                        <div class="ivy-form-group">
                            <label>Điện thoại<span>*</span></label>
                            <input type="tel" id="phone" placeholder="Điện thoại..." required>
                        </div>
                    </div>

                    <div class="ivy-form-row">
                        <div class="ivy-form-group">
                            <label>Ngày sinh<span>*</span></label>
                            <input type="text" id="dob" placeholder="Ngày sinh...">
                        </div>
                        <div class="ivy-form-group">
                            <label>Giới tính<span>*</span></label>
                            <select id="gender">
                                <option value="male">Nam</option>
                                <option value="female">Nữ</option>
                                <option value="other">Khác</option>
                            </select>
                        </div>
                    </div>

                    <div class="ivy-form-group">
                        <label>Địa chỉ<span>*</span></label>
                        <textarea id="address" placeholder="Địa chỉ..."></textarea>
                    </div>
                </div>

                <!-- Right Column: Security Info -->
                <div class="ivy-auth-side">
                    <div class="ivy-side-card">
                        <h3 class="ivy-auth-section-title">Thông tin mật khẩu</h3>
                        
                        <div class="ivy-form-group">
                            <label>Mật khẩu<span>*</span></label>
                            <input type="password" id="password" placeholder="Mật khẩu..." required>
                        </div>
                        
                        <div class="ivy-form-group">
                            <label>Nhập lại mật khẩu<span>*</span></label>
                            <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu..." required>
                        </div>

                        <div class="ivy-check-group">
                            <label class="ivy-check-item">
                                <input type="checkbox" required checked>
                                <span>Đồng ý với các <a href="#" style="color:#d00;">điều khoản</a> của IVY</span>
                            </label>
                            <label class="ivy-check-item">
                                <input type="checkbox">
                                <span>Đăng ký nhận bản tin</span>
                            </label>
                        </div>

                        <button type="submit" class="ivy-btn-auth-full" id="submitBtn">ĐĂNG KÝ</button>
                        
                        <p style="text-align:center; font-size:12px; margin-top:20px; color:#666;">
                            Đã có tài khoản? <a href="login.html" style="color:#000; font-weight:700;">Đăng nhập ngay</a>
                        </p>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <footer class="site-footer"></footer>
    <script type="module" src="../assets/js/common.js"></script>
    <script type="module" src="../assets/js/auth.js"></script>
</body>
</html>
