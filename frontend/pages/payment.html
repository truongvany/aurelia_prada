<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanh Toán Đơn Hàng - Aurelia Prada</title>
  <meta name="description" content="Xác nhận và thanh toán đơn hàng Aurelia Prada.">
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <style>
    /* ─── Layout ─────────────────────────────────── */
    .pay-shell { padding: 52px 0 100px; min-height: 75vh; background: #f9f8f6; }
    .pay-container { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

    /* ─── Progress ──────────────────────────────── */

    /* ─── Grid ──────────────────────────────────── */
    .pay-grid {
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: 36px;
      align-items: start;
    }
    @media(max-width:860px) { .pay-grid { grid-template-columns: 1fr; } }

    /* ─── Card ──────────────────────────────────── */
    .pay-card {
      background: #fff; border: 1px solid #eee;
      padding: 28px 30px; margin-bottom: 24px;
    }
    .pay-card-title {
      font-family: 'Manrope', sans-serif;
      font-size: 17px; font-weight: 700;
      margin-bottom: 20px; padding-bottom: 14px;
      border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; gap: 10px;
    }

    /* ─── Status Timeline ───────────────────────── */
    .status-timeline { display: flex; flex-direction: column; gap: 0; }
    .status-step {
      display: flex; gap: 16px; align-items: flex-start;
      position: relative; padding-bottom: 24px;
    }
    .status-step:last-child { padding-bottom: 0; }
    .status-step::before {
      content: ''; position: absolute;
      left: 15px; top: 30px; bottom: 0;
      width: 2px; background: #f0f0f0;
    }
    .status-step:last-child::before { display: none; }
    .status-step.done::before { background: #27ae60; }
    .status-step.active::before { background: linear-gradient(#27ae60, #f0f0f0); }

    .step-icon {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; background: #f5f5f5; z-index: 1;
      border: 2px solid #f0f0f0; transition: all .3s;
    }
    .status-step.done .step-icon { background: #27ae60; border-color: #27ae60; color: #fff; }
    .status-step.active .step-icon {
      background: #1a1a1a; border-color: #1a1a1a; color: #fff;
      box-shadow: 0 0 0 4px rgba(26,26,26,.12);
    }
    .step-content { flex: 1; }
    .step-content h4 { font-size: 13px; font-weight: 700; margin: 0 0 3px; }
    .step-content p { font-size: 12px; color: #888; margin: 0; }
    .step-content .step-time { font-size: 11px; color: #aaa; margin-top: 3px; }

    /* ─── QR Payment ────────────────────────────── */
    .qr-section { text-align: center; padding: 8px 0; }
    .qr-tabs { display: flex; gap: 0; margin-bottom: 20px; border: 1px solid #eee; }
    .qr-tab {
      flex: 1; padding: 10px; font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
      background: #fafafa; color: #aaa; border: none;
      border-right: 1px solid #eee; transition: all .2s;
    }
    .qr-tab:last-child { border-right: none; }
    .qr-tab.active { background: #1a1a1a; color: #fff; }
    .qr-tab:hover:not(.active) { background: #f0f0f0; color: #555; }

    .qr-panel { display: none; }
    .qr-panel.active { display: block; }

    .qr-img-wrap {
      width: 280px; height: 280px; margin: 0 auto 20px;
      border: 1px solid #eee; border-radius: 4px; padding: 15px;
      display: flex; align-items: center; justify-content: center;
      background: #fff;
    }
    .qr-img-wrap img { width: 100%; height: 100%; object-fit: contain; transform: scale(1.1); }
    .qr-img-wrap .qr-placeholder {
      font-size: 60px; opacity: .4;
    }

    .bank-info { text-align: left; }
    .bank-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px;
    }
    .bank-row:last-child { border-bottom: none; }
    .bank-row span:first-child { color: #888; font-size: 12px; }
    .bank-row .bank-val { font-weight: 700; color: #1a1a1a; }
    .bank-row .copy-btn {
      border: none; background: #f5f5f5; cursor: pointer; padding: 4px 10px;
      font-size: 11px; border-radius: 2px; color: #555;
      transition: background .2s;
    }
    .bank-row .copy-btn:hover { background: #1a1a1a; color: #fff; }

    .pay-amount-highlight {
      background: linear-gradient(135deg, #1a1a1a 0%, #444 100%);
      color: #fff; padding: 14px 20px; margin: 16px 0 0;
      display: flex; justify-content: space-between; align-items: center;
      border-radius: 2px;
    }
    .pay-amount-highlight span:first-child { font-size: 12px; opacity: .7; }
    .pay-amount-highlight span:last-child { font-size: 18px; font-weight: 800; letter-spacing: 1px; }

    /* ─── Order Summary sidebar ─────────────────── */
    .pay-sidebar { position: sticky; top: 100px; }

    .order-item-list { display: flex; flex-direction: column; gap: 14px; }
    .order-item { display: flex; gap: 12px; align-items: center; }
    .order-item img { width: 56px; height: 70px; object-fit: cover; border-radius: 2px; background: #f5f5f5; flex-shrink: 0; }
    .order-item-info h5 { margin: 0 0 3px; font-size: 13px; font-weight: 600; }
    .order-item-info p { margin: 0; font-size: 11px; color: #999; }
    .order-item-price { margin-left: auto; font-weight: 700; font-size: 13px; white-space: nowrap; }

    .pay-totals { border-top: 1px solid #f0f0f0; padding-top: 14px; margin-top: 16px; }
    .pay-total-row { display: flex; justify-content: space-between; font-size: 13px; color: #666; padding: 5px 0; }
    .pay-total-row.grand { font-size: 17px; font-weight: 800; color: #1a1a1a; border-top: 1px solid #1a1a1a; margin-top: 8px; padding-top: 12px; }
    .pay-total-row.grand span:last-child { color: #e74c3c; }
    .pay-discount-val { color: #27ae60; }

    .pay-notice { font-size: 11px; color: #aaa; margin-top: 14px; display: flex; gap: 6px; align-items: flex-start; }

    /* ─── COD Confirm box ───────────────────────── */
    .cod-box {
      background: #f9f8f6; border: 1px solid #eee;
      padding: 20px; text-align: center;
    }
    .cod-box .cod-icon { font-size: 44px; margin-bottom: 12px; }
    .cod-box h3 { font-family: 'Manrope', sans-serif; font-size: 18px; margin-bottom: 8px; }
    .cod-box p { font-size: 13px; color: #777; line-height: 1.7; }
    .cod-id { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 15px; margin: 14px 0 0; color: #1a1a1a; }

    /* ─── Back link ─────────────────────────────── */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: #999; text-decoration: none;
      margin-bottom: 24px; transition: color .2s;
    }
    .back-link:hover { color: #1a1a1a; }

    /* ─── Status badge ──────────────────────────── */
    .status-badge-inline {
      display: inline-block; padding: 4px 12px; border-radius: 2px;
      font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
    }
    .sb-processing { background: #fff8e1; color: #f39c12; }
    .sb-confirmed  { background: #e8f0ff; color: #2980b9; }
    .sb-shipped    { background: #ede8ff; color: #8e44ad; }
    .sb-delivered  { background: #e8f8f0; color: #27ae60; }
    .sb-cancelled  { background: #fde8e8; color: #e74c3c; }

    /* ─── Success View ─── */
    .success-card {
      background: #fafafa; border: 1px solid #eee;
      padding: 45px 30px; text-align: center;
      margin-bottom: 30px; position: relative;
    }
    .success-icon-wrap {
      width: 64px; height: 64px; background: #fff;
      border: 1.5px solid #1a1a1a; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 25px;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .success-title {
      font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700;
      color: #1a1a1a; margin-bottom: 12px; letter-spacing: -0.2px; text-transform: uppercase;
    }
    .success-desc {
      font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 400;
      color: #777; max-width: 380px; margin: 0 auto 28px; line-height: 1.7;
    }
    .order-id-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: #fff; border: 1px dashed #eee; padding: 10px 20px;
      border-radius: 2px; font-family: 'Space Mono', monospace;
      font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 30px;
    }
    .order-id-badge span { color: #aaa; font-weight: 400; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

    .btn-profile-orders {
      display: inline-flex; align-items: center; gap: 10px;
      background: #1a1a1a; color: #fff; padding: 16px 36px;
      text-decoration: none; font-family: 'Manrope', sans-serif;
      font-size: 10px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; border-radius: 0px;
      transition: all .3s;
    }
    .btn-profile-orders:hover { background: #333; }

    /* ─── Horizontal Stepper (Compact) ─── */
    .horizontal-stepper {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 40px; position: relative; padding: 0;
    }
    .h-step {
      flex: 1; position: relative; display: flex; flex-direction: column;
      align-items: center; text-align: center;
    }
    .h-step-line {
      position: absolute; top: 15px; left: calc(-50% + 15px); right: calc(50% + 15px);
      height: 1.5px; background: #eee; z-index: 0;
    }
    .h-step:first-child .h-step-line { display: none; }
    .h-step.done .h-step-line, .h-step.active .h-step-line { background: #1a1a1a; }

    .h-step-icon {
      width: 30px; height: 30px; background: #fff; border: 1.2px solid #eee;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px; color: #ddd; z-index: 1; transition: all .3s;
    }
    .h-step-icon svg { width: 14px; height: 14px; }
    .h-step.done .h-step-icon { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
    .h-step.active .h-step-icon { background: #fff; border: 1.5px solid #1a1a1a; color: #1a1a1a; }

    .h-step-label {
      font-family: 'Manrope', sans-serif; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; color: #ccc;
    }
    .h-step.done .h-step-label, .h-step.active .h-step-label { color: #1a1a1a; }

    /* Loading */
    .skeleton { background: linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>
  <header class="top-nav"></header>

  <main class="pay-shell">
    <div class="pay-container">

      <!-- Progress -->
      <div class="co-progress">
        <a href="cart.html" class="step done">
          <div class="dot">1</div>
          <div class="lbl">Giỏ hàng</div>
          <div class="line"></div>
        </a>
        <a href="checkout.html" class="step done">
          <div class="dot">2</div>
          <div class="lbl">Đặt hàng</div>
          <div class="line"></div>
        </a>
        <a href="#" class="step active">
          <div class="dot">3</div>
          <div class="lbl">Thanh toán</div>
          <div class="line"></div>
        </a>
        <a href="#" class="step">
          <div class="dot">4</div>
          <div class="lbl">Hoàn thành</div>
          <div class="line"></div>
        </a>
      </div>

      <a href="checkout.html" class="back-link">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        Quay lại đặt hàng
      </a>

      <!-- Grid -->
      <div class="pay-grid">
        <!-- LEFT -->
        <div class="pay-left">

          <!-- Initial Status Timeline (Removed per request, will show in success state) -->
          <div id="success-view-container"></div>

          <!-- Payment Method Panel -->
          <div class="pay-card" id="paymentPanel">
            <h2 class="pay-card-title">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
              Thông tin thanh toán
            </h2>
            <div id="paymentContent">
              <div class="skeleton" style="height:260px; border-radius:4px;"></div>
            </div>
          </div>

        </div>

        <!-- RIGHT: sidebar -->
        <aside class="pay-sidebar">
          <div class="pay-card">
            <h2 class="pay-card-title" style="margin-bottom:14px;">
              Đơn hàng của bạn
              <span id="payItemCount" style="font-size:12px;font-weight:400;color:#aaa;margin-left:auto;font-family:sans-serif;"></span>
            </h2>

            <div class="order-item-list" id="payItemList">
              <div class="skeleton" style="height:70px; border-radius:4px;"></div>
            </div>

            <div class="pay-totals" id="payTotals">
              <div class="skeleton" style="height:100px; border-radius:4px; margin-top:14px;"></div>
            </div>

            <div class="pay-notice">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
              Mọi thông tin của bạn được mã hóa và bảo mật hoàn toàn.
            </div>
          </div>

          <!-- Shipping Info -->
          <div class="pay-card" id="shippingInfoCard" style="margin-top:0;">
            <h2 class="pay-card-title" style="margin-bottom:14px;">Thông tin giao hàng</h2>
            <div id="shippingInfoContent">
              <div class="skeleton" style="height:80px; border-radius:4px;"></div>
            </div>
          </div>
        </aside>
      </div>

    </div>
  </main>

  <footer class="site-footer"></footer>

  <script type="module" src="../assets/js/common.js"></script>
  <script type="module" src="../assets/js/payment.js"></script>
</body>
</html>
