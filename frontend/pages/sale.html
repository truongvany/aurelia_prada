<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khuyến Mãi & Combo | AURELIA PRADA</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <style>
        :root {
            --aura-sale: #E31837; /* Vibrant luxury red */
        }
        
        .sale-banner {
            background: #000;
            color: #fff;
            padding: 100px 0 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .sale-badge-float {
            position: absolute;
            background: var(--aura-sale);
            padding: 10px 40px;
            font-weight: 800;
            transform: rotate(-15deg);
            left: -20px;
            top: 40px;
            letter-spacing: 2px;
            font-size: 14px;
        }

        .sale-banner h1 {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }
        
        /* Promotion Section styles */
        .promo-section {
            padding: 80px 0;
            border-bottom: 1px solid #eee;
        }
        
        .promo-section:last-child {
            border-bottom: none;
        }

        .promo-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .promo-header h2 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #000;
            margin-bottom: 10px;
        }

        .promo-header .line {
            width: 60px;
            height: 3px;
            background: var(--aura-sale);
            margin: 15px auto;
        }
        
        .promo-desc {
            color: #666;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .sale-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .no-promo-msg {
            text-align: center;
            padding: 100px 20px;
            font-size: 1.5rem;
            color: #888;
        }

        .combo-badge {
            background: #111;
            color: #fff;
            display: inline-block;
            padding: 5px 15px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-radius: 20px;
        }

        @media (max-width: 1200px) {
            .sale-grid { grid-template-columns: repeat(3, 1fr); }
            .sale-banner h1 { font-size: 4rem; }
        }
        @media (max-width: 850px) {
            .sale-grid { grid-template-columns: repeat(2, 1fr); }
            .promo-header h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <header class="top-nav" id="topNav"></header>

    <main>
        <div class="sale-badge-float">SPECIAL OFFERS</div>
        <section class="sale-banner">
            <div class="container">
                <span style="font-weight: 800; letter-spacing: 5px; color: var(--aura-sale); display: block; margin-bottom: 15px;">AURELIA EXCLUSIVE</span>
                <h1>HAY LÀ MÌNH MUA ĐI</h1>
                <p style="color: #bbb; font-weight: 500; letter-spacing: 1px; margin-top: 20px;">Khám phá các chương trình Khuyến mãi & Combo hấp dẫn nhất hiện nay.</p>
            </div>
        </section>

        <div id="promotions-container">
            <div class="no-promo-msg">Đang tải dữ liệu khuyến mãi...</div>
        </div>
    </main>

    <footer class="site-footer"></footer>

    <script type="module">
        import { createProductCard } from '../assets/js/common.js';
        import { fetchActivePromotions, fetchProducts } from '../assets/js/api.js';

        const container = document.getElementById('promotions-container');

        async function initPromotions() {
            try {
                // Fetch Active Promotions & All Products
                const [promotions, allProducts] = await Promise.all([
                    fetchActivePromotions(),
                    fetchProducts()
                ]);

                if (!promotions || promotions.length === 0) {
                    container.innerHTML = `
                        <div class="no-promo-msg">
                            Hiện tại chưa có chương trình khuyến mãi nào.<br>
                            <a href="shop.html" style="color:#000; font-weight:bold; font-size: 1rem; text-decoration:underline; display:inline-block; margin-top: 15px;">Khám phá sản phẩm mới</a>
                        </div>`;
                    return;
                }

                container.innerHTML = '';

                // Render each promotion block
                promotions.forEach(promo => {
                    let productsToShow = [];

                    // Determine which products apply
                    if (promo.applyToAll) {
                        productsToShow = [...allProducts];
                    } else if (promo.targetProducts && promo.targetProducts.length > 0) {
                        const targetIds = promo.targetProducts.map(p => p._id || p);
                        productsToShow = allProducts.filter(p => targetIds.includes(p._id));
                    }

                    if (productsToShow.length === 0) {
                        productsToShow = []; // Still render the section but with a message
                    }

                    // Apply discount logic locally for DISPLAY ONLY (Backend Cart API will recalculate for actual order)
                    const displayItems = productsToShow.map(p => {
                        const item = { ...p };
                        if (promo.type === 'percentage') {
                            item.originalPrice = p.price;
                            item.price = p.price * (1 - promo.discountValue / 100);
                        } else if (promo.type === 'fixed_amount') {
                            item.originalPrice = p.price;
                            item.price = Math.max(0, p.price - promo.discountValue);
                        }
                        return item;
                    });

                    const gridHtml = productsToShow.length > 0
                        ? displayItems.map(p => createProductCard(p)).join('')
                        : '<div style="grid-column: 1/-1; text-align:center; padding: 40px; color:#999;">Chưa có sản phẩm nào thuộc chương trình này tiếp theo cấu hình hiện tại.</div>';

                    const sectionHtml = `
                        <section class="promo-section">
                            <div class="container">
                                <div class="promo-header">
                                    ${promo.type === 'combo_quantity' ? `<div class="combo-badge">COMBO MUA ${promo.minQuantity}</div>` : ''}
                                    <h2>${promo.name}</h2>
                                    <div class="line"></div>
                                    <p class="promo-desc">${promo.description || 'Số lượng có hạn. Áp dụng ngay hôm nay.'}</p>
                                </div>
                                <div class="sale-grid">
                                    ${gridHtml}
                                </div>
                            </div>
                        </section>
                    `;
                    container.innerHTML += sectionHtml;
                });

            } catch (err) {
                console.error('Lỗi tải dữ liệu Khuyến mãi:', err);
                container.innerHTML = `<div class="no-promo-msg">Đã xảy ra lỗi tải dữ liệu. Vui lòng thử lại sau.</div>`;
            }
        }

        initPromotions();
    </script>
    <script type="module" src="../assets/js/common.js"></script>
</body>
</html>
