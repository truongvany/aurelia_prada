<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sale Đồng Giá | AURELIA PRADA</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <style>
        :root {
            --aura-sale: #E31837; /* Vibrant luxury red */
        }
        
        .sale-banner {
            background: #000;
            color: #fff;
            padding: 100px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .sale-badge-float {
            position: absolute;
            background: var(--aura-sale);
            padding: 10px 40px;
            font-weight: 800;
            transform: rotate(-15deg);
            left: -20px;
            top: 40px;
            letter-spacing: 2px;
            font-size: 14px;
        }

        .sale-banner h1 {
            font-size: 6rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }
        
        .countdown-wrap {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
        }
        
        .countdown-item { text-align: center; }
        .countdown-val { font-size: 32px; font-weight: 800; display: block; border: 1px solid rgba(255,255,255,0.3); padding: 15px 25px; min-width: 100px; }
        .countdown-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #999; margin-top: 8px; display: block; }

        /* Price Tabs Section */
        .price-nav {
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px 0;
        }
        
        .price-tab {
            font-size: 16px;
            font-weight: 800;
            color: #999;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            text-transform: uppercase;
        }
        .price-tab:hover, .price-tab.active { color: #000; }
        .price-tab.active::after {
            content: '';
            position: absolute;
            bottom: -22px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--aura-sale);
        }

        /* Products Grid */
        .sale-grid-wrapper { padding: 80px 0; }
        .sale-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }
        
        .price-header {
            text-align: center;
            margin-bottom: 80px;
        }
        .price-header h2 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #000;
        }
        .price-header .line {
            width: 80px;
            height: 4px;
            background: var(--aura-sale);
            margin: 20px auto;
        }

        @media (max-width: 1200px) {
            .sale-grid { grid-template-columns: repeat(3, 1fr); }
            .sale-banner h1 { font-size: 4rem; }
        }
        @media (max-width: 850px) {
            .sale-grid { grid-template-columns: repeat(2, 1fr); }
            .price-nav { gap: 15px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <header class="top-nav"></header>

    <main>
        <div class="sale-badge-float">LIMITED OFFER</div>
        <section class="sale-banner">
            <div class="container">
                <span style="font-weight: 800; letter-spacing: 5px; color: var(--aura-sale); display: block; margin-bottom: 15px;">FLASH SALE EVENT</span>
                <h1>UNIFORM SALE</h1>
                <p style="color: #aaa; font-weight: 500; letter-spacing: 1px;">Sự kiện ưu đãi đồng giá lớn nhất năm - Đừng bỏ lỡ.</p>
                
                <div class="countdown-wrap">
                    <div class="countdown-item">
                        <span class="countdown-val">04</span>
                        <span class="countdown-label">Ngày</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-val">12</span>
                        <span class="countdown-label">Giờ</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-val">45</span>
                        <span class="countdown-label">Phút</span>
                    </div>
                    <div class="countdown-item">
                        <span class="countdown-val">09</span>
                        <span class="countdown-label">Giây</span>
                    </div>
                </div>
            </div>
        </section>

        <nav class="price-nav">
            <div class="price-tab active" data-price="199000">ĐỒNG GIÁ 199K</div>
            <div class="price-tab" data-price="399000">ĐỒNG GIÁ 399K</div>
            <div class="price-tab" data-price="599000">ĐỒNG GIÁ 599K</div>
            <div class="price-tab" data-price="999000">ĐỒNG GIÁ 999K</div>
        </nav>

        <section class="sale-grid-wrapper container">
            <div class="price-header">
                <h2 id="current-price-title">ĐỒNG GIÁ 199K</h2>
                <div class="line"></div>
                <p class="text-muted">Chọn lọc những sản phẩm tâm đắc nhất tại AURELIA.</p>
            </div>
            
            <div class="sale-grid" id="sale-grid">
                <!-- Products will be loaded here -->
            </div>
        </section>
    </main>

    <footer class="site-footer"></footer>

    <script type="module">
        import { createProductCard } from '../assets/js/common.js';
        import { fetchProducts } from '../assets/js/api.js';

        const grid = document.getElementById('sale-grid');
        const priceTitle = document.getElementById('current-price-title');
        const tabs = document.querySelectorAll('.price-tab');

        let allSaleProducts = [];

        async function initSale() {
            try {
                // For demonstration, we fetch all products
                // In a real app, you might have a dedicated /api/products/sale
                allSaleProducts = await fetchProducts();
                
                // Shuffle items for variety
                allSaleProducts = allSaleProducts.sort(() => Math.random() - 0.5);
                
                // Set initial grid (199K)
                loadByPrice(199000);
            } catch (err) {
                console.error('Sale products error:', err);
            }
        }

        function loadByPrice(price) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px;">Đang tải sản phẩm...</div>';
            
            // Mocking the "flattening" of prices for the sale page
            // We map some products to the specific target price for visual consistency
            // In a real system, the DB would already have these prices
            const targetItems = allSaleProducts.slice(0, 8).map(p => ({
                ...p,
                originalPrice: p.price,
                price: price
            }));

            setTimeout(() => {
                grid.innerHTML = targetItems.map(p => createProductCard(p)).join('');
                priceTitle.textContent = `ĐỒNG GIÁ ${price / 1000}K`;
            }, 300);
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadByPrice(parseInt(tab.dataset.price));
            });
        });

        initSale();
    </script>
    <script type="module" src="../assets/js/common.js"></script>
</body>
</html>
